<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Defqon Stream Recorder</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 flex items-center justify-center px-4">
  <form id="login-form" class="panel w-full max-w-sm">
    <div class="panel-head"><h2>Sign in</h2></div>
    <p class="mb-3 text-sm text-zinc-400">Defqon Stream Recorder</p>
    <label>Username<input id="username" class="input" autocomplete="username" autofocus></label>
    <label>Password<input id="password" type="password" class="input" autocomplete="current-password"></label>
    <p id="login-error" class="mb-3 hidden text-sm text-rose-300"></p>
    <button type="submit" class="btn primary w-full">Sign in</button>
    <button type="button" id="discord-login" class="btn w-full mt-2 hidden">Log in with Discord</button>
  </form>
  <script>
    const discordErrors = {
      denied: 'Discord login was cancelled.',
      invalid_state: 'That Discord login link expired - try again.',
      exchange_failed: 'Could not complete Discord login - try again.',
      not_configured: 'Discord login is not configured on this instance.',
      not_linked: 'No account here is linked to that Discord account yet - sign in with your username and password, then link Discord from Settings.',
    };

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const discordBtn = document.getElementById('discord-login');

    const params = new URLSearchParams(window.location.search);
    const discordError = params.get('discordError');
    if (discordError) {
      errorEl.textContent = discordErrors[discordError] || 'Discord login failed.';
      errorEl.classList.remove('hidden');
    }

    fetch('/api/auth/discord/status').then(r => r.json()).then(s => {
      if (s.enabled) discordBtn.classList.remove('hidden');
    }).catch(() => {});
    discordBtn.addEventListener('click', () => {
      window.location.href = '/api/auth/discord/login/start';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      let res;
      try {
        res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
      } catch (err) {
        errorEl.textContent = `Network error: ${err.message}`;
        errorEl.classList.remove('hidden');
        return;
      }
      if (!res.ok) {
        const text = await res.text().catch(() => 'Invalid username or password');
        errorEl.textContent = text || 'Invalid username or password';
        errorEl.classList.remove('hidden');
        return;
      }
      window.location.href = params.get('next') || '/';
    });
  </script>
</body>
</html>
