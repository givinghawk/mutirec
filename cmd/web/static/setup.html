<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Set up — Defqon Stream Recorder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app.css">
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100 flex items-center justify-center px-4">
  <form id="setup-form" class="panel w-full max-w-sm">
    <div class="panel-head"><h2>Welcome</h2></div>
    <p class="mb-3 text-sm text-zinc-400">This is a first run — choose a username and password for this instance. No environment variables required; you can change these later from Settings.</p>
    <label>Username<input id="username" class="input" autocomplete="username" autofocus placeholder="admin"></label>
    <label>Password<input id="password" type="password" class="input" autocomplete="new-password"></label>
    <label>Confirm password<input id="confirm" type="password" class="input" autocomplete="new-password"></label>
    <p class="-mt-2 mb-3 text-xs text-zinc-500">At least 8 characters.</p>
    <p id="setup-error" class="mb-3 hidden text-sm text-rose-300"></p>
    <button type="submit" class="btn primary w-full">Create account</button>
  </form>
  <script>
    const form = document.getElementById('setup-form');
    const errorEl = document.getElementById('setup-error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (!username || password.length < 8) {
        errorEl.textContent = 'A username and a password of at least 8 characters are required.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }
      let res;
      try {
        res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
      } catch (err) {
        errorEl.textContent = `Network error: ${err.message}`;
        errorEl.classList.remove('hidden');
        return;
      }
      if (!res.ok) {
        const text = await res.text().catch(() => 'Setup failed');
        errorEl.textContent = text || 'Setup failed';
        errorEl.classList.remove('hidden');
        return;
      }
      window.location.href = '/';
    });
  </script>
</body>
</html>
