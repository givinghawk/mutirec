services:
  recorder:
    build:
      context: .
      args:
        APP: web
    image: ghcr.io/your-github-user/mutirec:local
    container_name: mutirec
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Europe/Amsterdam
      CONFIG_PATH: /data/config/config.json
      FINISHED_DIR: /data/recordings
      TEMP_DIR: /data/incomplete
      LOG_DIR: /data/logs
      # Credentials are optional here: leave AUTH_USERNAME/AUTH_PASSWORD unset
      # and the app walks you through a one-time setup wizard in the browser
      # on first start instead, creating the first admin user (saved to
      # /data/config/users.json - further users are managed from Settings ->
      # Users). Uncomment these only if you'd also like one admin login
      # pinned externally on top of that - when set, it's always available
      # and can't be changed from the UI.
      # AUTH_USERNAME: yourname
      # AUTH_PASSWORD: a-long-random-password
    volumes:
      - ./data:/data
      # SMB/NFS option: mount the share on the host, then bind it here.
      # - /mnt/mutirec-recordings:/data/recordings
      # rclone option: mount your rclone.conf for backups.
      # - ~/.config/rclone/rclone.conf:/home/app/.config/rclone/rclone.conf:ro

