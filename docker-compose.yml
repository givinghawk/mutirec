services:
  recorder:
    build:
      context: .
      args:
        APP: web
    image: ghcr.io/your-github-user/defqon-stream-recorder:local
    container_name: defqon-stream-recorder
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Europe/Amsterdam
      CONFIG_PATH: /data/config/config.json
      FINISHED_DIR: /data/recordings
      TEMP_DIR: /data/incomplete
      LOG_DIR: /data/logs
      # Credentials are optional here: leave AUTH_USERNAME/AUTH_PASSWORD unset
      # and the app walks you through a one-time setup wizard in the browser
      # on first start instead (saved to /data/config/auth.json). Uncomment
      # these only if you'd rather pin credentials externally - when set,
      # they always take priority and can't be changed from the UI.
      # AUTH_USERNAME: yourname
      # AUTH_PASSWORD: a-long-random-password
    volumes:
      - ./data:/data
      # SMB/NFS option: mount the share on the host, then bind it here.
      # - /mnt/defqon-recordings:/data/recordings
      # rclone option: mount your rclone.conf for backups.
      # - ~/.config/rclone/rclone.conf:/home/app/.config/rclone/rclone.conf:ro

